name: Release

on:
  push:
    tags:
      - 'v*'

# Only one release build at a time; never cancel an in-flight release.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build & Release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # ── Version validation ────────────────────────────────────────────
      # Ensure the git tag matches the version declared in package.json.
      # Prevents accidental releases with mismatched version numbers.
      - name: Validate tag matches package.json version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match package.json version ($PKG_VERSION)"
            exit 1
          fi
          echo "VERSION=$TAG_VERSION" >> "$GITHUB_ENV"

      # ── Quality gates ─────────────────────────────────────────────────
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test

      # ── macOS Code Signing ─────────────────────────────────────────────
      # Import the Developer ID Application certificate into a temporary
      # keychain so electron-builder can sign the app in CI.
      - name: Import macOS signing certificate
        env:
          MAC_CERTIFICATE: ${{ secrets.MAC_CERTIFICATE }}
          MAC_CERTIFICATE_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          # Decode the certificate from base64
          echo -n "$MAC_CERTIFICATE" | base64 --decode -o $CERTIFICATE_PATH

          # Create a temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Import certificate into the keychain
          security import $CERTIFICATE_PATH -P "$MAC_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Add temporary keychain to the search list
          security list-keychains -d user -s $KEYCHAIN_PATH

      # ── Build ─────────────────────────────────────────────────────────
      # Vite build (main + preload + renderer)
      - run: pnpm build

      # Electron Builder — produces DMG + ZIP for macOS (universal binary)
      # With code signing and notarization enabled.
      - name: Build Electron App
        run: npx electron-builder --mac --universal
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Code Signing
          CSC_LINK: ${{ secrets.MAC_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
          # Notarization
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      # ── Publish ───────────────────────────────────────────────────────
      # Upload only installer artifacts (DMG + ZIP). Blockmap files are
      # excluded — they are only needed by electron-updater (Phase 3).
      # The *.dmg.zip (DMG archive) is excluded via negation pattern.
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: OpenCow v${{ env.VERSION }}
          files: |
            dist/*.dmg
            dist/*-mac.zip
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-beta') || contains(github.ref, '-alpha') || contains(github.ref, '-rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
